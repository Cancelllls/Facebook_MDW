<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Super Mario Bros - JavaScript Edition</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
      window.onerror = function(msg, url, line, col, error) {
        console.error(msg, error);
        return false;
      };
    </script>
  </head>
  <body>
    <!-- Game Canvas Container -->
    <div id="game-container" style="position: relative; width: 768px; height: 720px; margin: 0 auto;">
      <!-- The canvas will be injected here by mario.js -->
      
      <!-- Start Screen / Level Selector -->
      <div id="start-screen" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #5c94fc; z-index: 50; font-family: 'Courier New', Courier, monospace;">
        
        <!-- Classic Logo Style -->
        <h1 style="font-size: 80px; font-weight: 900; color: #ffcece; text-shadow: 6px 6px 0 #d92727, 12px 12px 0 #000; margin: 0 0 40px 0; letter-spacing: -4px; text-align: center; line-height: 1.1;">
          SUPER<br>MARIO BROS.
        </h1>
        
        <style>
          @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
          .blink-text { animation: blink 1s step-end infinite; color: #fbd000; text-shadow: 3px 3px 0 #000; font-size: 28px; font-weight: bold; margin-bottom: 50px; }
          .level-item { font-size: 28px; font-weight: bold; color: white; text-shadow: 3px 3px 0 #000; display: flex; align-items: center; cursor: pointer; padding: 10px; margin: 5px; transition: transform 0.1s; }
          .level-item:hover { transform: scale(1.05); }
          .level-cursor { display: inline-block; width: 20px; height: 20px; background-color: #fbd000; border: 4px solid #000; border-radius: 50%; margin-right: 15px; visibility: hidden; }
          .level-item.selected .level-cursor { visibility: visible; }
        </style>

        <div class="blink-text">PRESS ENTER TO START</div>

        <div id="level-menu" style="display: flex; flex-direction: column; align-items: flex-start;">
          <div class="level-btn level-item selected" data-level="oneone"><span class="level-cursor"></span>WORLD 1-1</div>
          <div class="level-btn level-item" data-level="onetwo"><span class="level-cursor"></span>WORLD 1-2</div>
          <div class="level-btn level-item" data-level="onethree"><span class="level-cursor"></span>WORLD 1-3</div>
          <div class="level-btn level-item" data-level="onefour"><span class="level-cursor"></span>WORLD 1-4</div>
        </div>

        <div style="color: white; margin-top: 60px; font-size: 16px; font-weight: bold; text-shadow: 2px 2px 0 #000;">
          CONTROLS: ARROWS/WASD = MOVE | X/K = JUMP | Z/J = RUN
        </div>

        <script>
          // Simple menu navigation script
          setTimeout(function() {
            var items = document.querySelectorAll('.level-item');
            var currentIndex = 0;
            
            function updateMenu() {
              items.forEach(function(item, idx) {
                if(idx === currentIndex) item.classList.add('selected');
                else item.classList.remove('selected');
              });
            }
            
            window.addEventListener('keydown', function(e) {
              var startScreen = document.getElementById('start-screen');
              if(startScreen.style.display === 'none') return;
              
              if(e.key === 'ArrowDown' || e.key === 's') {
                currentIndex = (currentIndex + 1) % items.length;
                updateMenu();
              } else if(e.key === 'ArrowUp' || e.key === 'w') {
                currentIndex = (currentIndex - 1 + items.length) % items.length;
                updateMenu();
              } else if(e.key === 'Enter' || e.key === ' ') {
                items[currentIndex].click();
              }
            });
            
            // Mouse hover support
            items.forEach(function(item, idx) {
              item.addEventListener('mouseenter', function() {
                currentIndex = idx;
                updateMenu();
              });
            });
          }, 100);
        </script>
      </div>

      <!-- Touch Controls for Mobile -->
      <div id="touch-controls" style="position:absolute; bottom:20px; left:0; width:100%; display:flex; justify-content:space-between; padding:0 20px; box-sizing:border-box; z-index:100; pointer-events:none; user-select:none; -webkit-user-select:none;">
        <div style="display:grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(2, 50px); gap:5px; pointer-events:auto;">
          <div style="grid-column:2; background:rgba(255,255,255,0.3); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;" 
            onmousedown="event.preventDefault(); input.setKeyState('UP', true)" onmouseup="input.setKeyState('UP', false)" onmouseleave="input.setKeyState('UP', false)"
            ontouchstart="event.preventDefault(); input.setKeyState('UP', true)" ontouchend="event.preventDefault(); input.setKeyState('UP', false)">▲</div>
          <div style="grid-column:1; grid-row:2; background:rgba(255,255,255,0.3); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;" 
            onmousedown="event.preventDefault(); input.setKeyState('LEFT', true)" onmouseup="input.setKeyState('LEFT', false)" onmouseleave="input.setKeyState('LEFT', false)"
            ontouchstart="event.preventDefault(); input.setKeyState('LEFT', true)" ontouchend="event.preventDefault(); input.setKeyState('LEFT', false)">◀</div>
          <div style="grid-column:2; grid-row:2; background:rgba(255,255,255,0.3); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;" 
            onmousedown="event.preventDefault(); input.setKeyState('DOWN', true)" onmouseup="input.setKeyState('DOWN', false)" onmouseleave="input.setKeyState('DOWN', false)"
            ontouchstart="event.preventDefault(); input.setKeyState('DOWN', true)" ontouchend="event.preventDefault(); input.setKeyState('DOWN', false)">▼</div>
          <div style="grid-column:3; grid-row:2; background:rgba(255,255,255,0.3); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;" 
            onmousedown="event.preventDefault(); input.setKeyState('RIGHT', true)" onmouseup="input.setKeyState('RIGHT', false)" onmouseleave="input.setKeyState('RIGHT', false)"
            ontouchstart="event.preventDefault(); input.setKeyState('RIGHT', true)" ontouchend="event.preventDefault(); input.setKeyState('RIGHT', false)">▶</div>
        </div>
        <div style="display:flex; gap:10px; align-items:flex-end; pointer-events:auto;">
          <div style="width:60px; height:60px; background:rgba(255,255,255,0.5); border-radius:50%; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; font-size:20px;" 
            onmousedown="event.preventDefault(); input.setKeyState('RUN', true)" onmouseup="input.setKeyState('RUN', false)" onmouseleave="input.setKeyState('RUN', false)"
            ontouchstart="event.preventDefault(); input.setKeyState('RUN', true)" ontouchend="event.preventDefault(); input.setKeyState('RUN', false)">B</div>
          <div style="width:60px; height:60px; background:rgba(255,255,255,0.5); border-radius:50%; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; font-size:20px;" 
            onmousedown="event.preventDefault(); input.setKeyState('JUMP', true)" onmouseup="input.setKeyState('JUMP', false)" onmouseleave="input.setKeyState('JUMP', false)"
            ontouchstart="event.preventDefault(); input.setKeyState('JUMP', true)" ontouchend="event.preventDefault(); input.setKeyState('JUMP', false)">A</div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="js/assets.js"></script>
    <script src="js/mario.js"></script>
  </body>
</html>
